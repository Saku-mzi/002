<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deng Ziyan</title>
    <link rel="stylesheet" href="main.css" />
  </head>
  <body>
    <main>
      <div id="one">
        <div><h1>邓 子彦</h1></div>
        <div>
          <img
            id="pro-pic"
            src="images/profile-pic.jpg"
            alt="person"
            width="100%"
            height="100%"
          />
        </div>
      </div>
      <div id="two">
        <div><h1 id="heading">Silent Streets</h1></div>
        <div id="images">
          <img
            id="artwork1"
            src="images/landscape1.jpg"
            alt="land"
            width="30%"
            height="30%"
          />
          <img
            id="artwork2"
            src="images/landscape2.jpg"
            alt="land"
            width="30%"
            height="30%"
          />
          <img
            id="artwork5"
            src="images/landscape5.jpg"
            alt="land"
            width="61%"
            height="30%"
          />
        </div>
      </div>
      <div id="three">
        <p>
          <strong>
            Deng Ziyan is a visionary photographer whose work explores the quiet
            beauty of everyday life in China's rapidly evolving urban
            landscapes. Born in 1992, he gained recognition for his Silent
            Streets series.
          </strong>
        </p>
      </div>
      <div id="four">
        <div id="images2">
          <img
            id="artwork3"
            src="images/landscape3.jpg"
            alt="land"
            width="30%"
            height="50%"
          />
          <img
            id="artwork4"
            src="images/landscape4.jpg"
            alt="land"
            width="30%"
            height="50%"
          />
          <img
            id="artwork6"
            src="images/landscape6.jpg"
            alt="land"
            width="61%"
            height="30%"
          />
        </div>
      </div>
      <div id="five">
        <div>
          <a href="https://www.instagram.com"
            ><img src="images/instagram-logo.svg" alt="instagram-link"
          /></a>
        </div>
        <div>
          <a href="https://www.pinterest.com"
            ><img src="images/pinterest-logo.svg" alt="pinterest-link"
          /></a>
        </div>
        <div>
          <a href="https://www.x.com"
            ><img src="images/x-logo.svg" alt="x-link"
          /></a>
        </div>
        <div>
          <a href="https://www.facebook.com"
            ><img src="images/facebook-logo.svg" alt="facebook-link"
          /></a>
        </div>
      </div>
      <div id="six"><p>&#126 &#126 THANK YOU FOR THE VISIT &#126 &#126</p></div>
